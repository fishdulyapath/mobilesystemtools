  /saveTrans:
    post:
      tags: [POS]
      summary: บันทึก Invoice จาก POS
      description: |
        สร้าง Invoice (trans_flag=44) แบบ POS:

        - **doc_no**: Server generate อัตโนมัติจาก `pos_id.doc_format` + running max จาก ic_trans
        - **VAT**: Server คำนวณจาก `vat_type`, `vat_rate`, `discount_type`, `discount_word` ที่ client ส่งมา
        - **Cart**: ลบ `staff_cart_order` ของ cust_code นี้หลัง commit สำเร็จ
        - **discount_word format**: `"5%"` = 5%, `"5+3%"` = stacked, `"100B"` = ลด 100 บาท, `""` = ไม่ลด
        - Tables: ic_trans + cb_trans + ic_trans_detail + cb_trans_detail (ทั้งหมดใน 1 transaction)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SaveTransRequest' }
            example:
              doc_date: "2024-01-15"
              doc_time: "09:30:00"
              doc_format_code: "MINV"
              cust_code: "C00001"
              emp_code: "EMP001"
              pos_id: "MPOS01"
              shelf_code: "A01"
              vat_type: 1
              vat_rate: 7.0
              discount_type: 0
              discount_word: ""
              total_value: "1200.00"
              total_net_amount: "1200.00"
              total_credit_charge: "0"
              cash_amount: "1200.00"
              tranfer_amount: "0"
              card_amount: "0"
              wallet_amount: "0"
              rounded_amount: 0
              items:
                - item_code: "ITM001"
                  item_name: "น้ำดื่ม ABC 600ml"
                  unit_code: "ขวด"
                  barcode: "8850999000001"
                  qty: "100"
                  price: "12.00"
                  sum_amount: "1200.00"
                  wh_code: "WH01"
                  shelf_code: "A01"
                  stand_value: "1"
                  divide_value: "1"
                  ratio: "1"
              payment_detail:
                - pay_type: "0"
                  pay_amount: "1200.00"
                  trans_number: ""
                  charge: "0"
      responses:
        '200':
          description: บันทึกสำเร็จ
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SaveTransResponse' }
        '400':
          description: Validation error (pos_id ว่าง, items ว่าง, pos_id ไม่พบ)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  msg:     { type: string }
        '409':
          description: Running number overflow (doc_no เต็มแล้ว)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  msg:     { type: string, example: "ERR_DOC_RUNNING_OVERFLOW: ..." }
        '500':
          description: DB error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  msg:     { type: string }

  /savetransandpro:
    post:
      tags: [POS]
      summary: Save POS invoice and promotion detail
      description: |
        Same behavior as `/saveTrans`, plus optional promotion rows.

        When `promotion_detail` or `promotion_product_rows` has rows, the API inserts them into
        `ic_trans_detail_promotion` with `doc_no`, `doc_date`, `trans_flag=44`,
        `promotion_code`, `promotion_name`, `qty`, `price`, `sum_amount`, and `line_number`.

        Normal sale items still save to `ic_trans_detail`; promotion rows do not replace normal items.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SaveTransAndProRequest' }
            example:
              doc_date: "2026-05-13"
              doc_time: "14:30:00"
              doc_format_code: "SI"
              form_code: ""
              cust_code: "AR0269"
              branch_code: ""
              emp_code: "SALE01"
              creator_code: "SALE01"
              pos_id: "POS001"
              shelf_code: "A01"
              remark: ""
              inquiry_type: 1
              vat_type: 1
              vat_rate: 7
              discount_type: 0
              discount_word: ""
              total_value: "200.00"
              total_before_vat: "177.57"
              total_vat_value: "12.43"
              total_after_vat: "190.00"
              total_amount: "190.00"
              total_net_amount: "190.00"
