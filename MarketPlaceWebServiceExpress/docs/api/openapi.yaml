  /sale-print/render:
    get:
      tags: [Print]
      summary: Render ฟอร์มพิมพ์ขายเป็น HTML
      description: |
        Returns browser-printable HTML. `formcodes` can contain comma-separated codes.

        If `formcodes` is omitted, the first available form is used. If `log_print` is omitted,
        print logging follows `auto_print` (`auto_print=0` previews without logging by default).
      security: []
      parameters:
        - { name: doc_no, in: query, required: true, schema: { type: string }, example: "MPOS-2026-0001" }
        - { name: formcodes, in: query, schema: { type: string }, example: "UBK-IV-001" }
        - { name: auto_print, in: query, schema: { type: string, enum: ["0", "1"], default: "1" }, description: '"1" injects window.print behavior in HTML' }
        - { name: log_print, in: query, schema: { type: string, enum: ["0", "1"] }, description: "Explicit print log override; use 0 for preview" }
        - { name: user_code, in: query, schema: { type: string }, example: "001" }
      responses:
        '200':
          description: Rendered HTML
          headers:
            Cache-Control:
              schema: { type: string, example: "no-store" }
          content:
            text/html:
              schema: { type: string }
        '400':
          description: doc_no is required
          content:
            text/plain:
              schema: { type: string }
        '404':
          description: document or print form not found
          content:
            text/plain:
              schema: { type: string }
        '500':
          description: Render error
          content:
            text/plain:
              schema: { type: string }

