  /createPUDoc:
    post:
      tags: [Purchase]
      summary: สร้างเอกสาร PU
      description: |
        Creates PU (`trans_flag=12`) and resolves `doc_no` inside the final transaction.

        Permission required: `purchase.pu.create`.

        Cash PU (`sale_type` 1 or 3) requires `cash_amount + transfer_amount >= total_after_rounded`.
        If `transfer_amount > 0`, `payment_detail` is required and sum of `pay_amount` must equal `transfer_amount`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PUSaveRequest' }
      responses:
        '200':
          description: Saved
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PUSaveResponse' }
        '400':
          description: Validation failed or save error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: false }
                  msg: { type: string, example: "PU save validation failed" }
                  data: { $ref: '#/components/schemas/PUSavePlan' }
        '403':
          description: Permission denied
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponseLower' }

  /updatePUDoc:
    post:
      tags: [Purchase]
      summary: แก้ไขเอกสาร PU
      description: |
        Updates PU (`trans_flag=12`) by rebuilding details, PO references, cashbook rows, process, and logs.

        Permission required: `purchase.pu.edit`. `doc_format_code` cannot be changed after create.
      requestBody:
