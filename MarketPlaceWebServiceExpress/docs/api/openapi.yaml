            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponseLower' }

  /getPurchaseLatestItemPrices:
    post:
      tags: [Purchase]
      summary: ราคาซื้อล่าสุดของสินค้า
      description: Latest PU price is looked up by `item_code + unit_code`; barcode is echoed only for client mapping.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PurchaseLatestItemPriceRequest' }
      responses:
        '200':
          description: Latest purchase price per requested item/unit
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/PurchaseLatestItemPrice' }
        '500':
          description: DB error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponseLower' }

  /getPurchaseProductDetail:
    get:
      tags: [Purchase]
      summary: รายละเอียดสินค้าเฉพาะหน้าซื้อ/ตั้งหนี้
