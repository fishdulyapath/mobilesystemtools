  # ─── DOCUMENT ────────────────────────────────────────────────────────────────

  /getDocList:
    get:
      tags: [Document]
      summary: รายการเอกสาร (Invoice/CN/มัดจำ)
      description: |
        trans_flag: 40=มัดจำ, 44=Invoice, 46=ใบแจ้งหนี้, 48=CN

        ถ้าไม่ระบุ trans_flag → ดึง IN (40,44,48,46) ทั้งหมด
      parameters:
        - { name: cust_code,   in: query, required: true, schema: { type: string },                              example: "C00001" }
        - { name: trans_flag,  in: query,                 schema: { type: integer, enum: [40,44,46,48] },        description: "Filter ตามประเภทเอกสาร" }
      responses:
        '200':
          description: รายการเอกสาร
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/DocListItem' }
        '400':
          description: Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /getDocDetail:
    get:
      tags: [Document]
      summary: รายละเอียดเอกสาร + รายการสินค้า
      parameters:
        - { name: cust_code, in: query, required: true, schema: { type: string }, example: "C00001" }
        - { name: doc_no,    in: query, required: true, schema: { type: string }, example: "INV2401150001" }
      responses:
        '200':
          description: รายละเอียด หรือ `data:{}` ถ้าไม่พบ
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      remark_5:     { type: string }
                      doc_no:       { type: string }
                      doc_date:     { type: string, format: date }
                      doc_time:     { type: string }
                      cust_code:    { type: string }
                      send_type:    { type: integer }
                      total_amount: { type: number }
                      emp_code:     { type: string }
                      emp_name:     { type: string }
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/DocDetailLineItem' }
        '400':
          description: Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /getCompanyProfile:
    get:
      tags: [Document]
      summary: ข้อมูลบริษัท
      description: ดึงจาก erp_company_profile (row แรก) — `data` เป็น array แต่มีแค่ 1 element
      responses:
        '200':
