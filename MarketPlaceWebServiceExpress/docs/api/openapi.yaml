  /getDocSaleHistory:
    get:
      tags: [POS]
      summary: ประวัติการขาย POS
      description: |
        ดึงรายการ Invoice (trans_flag=44) ของ pos_id ที่ระบุ

        **Search logic** (ลอกจาก Java):
        - ถ้ามี `search` → **ยกเลิก** date filter แล้วค้นใน doc_no / cust_code / cust_name แทน
        - ถ้าไม่มี `search` + มี `from_date` + `to_date` → filter ตาม date range
      parameters:
        - { name: pos_id,     in: query, required: true,  schema: { type: string },         example: "MPOS01" }
        - { name: search,     in: query,                  schema: { type: string },         description: "ค้นใน doc_no, cust_code, cust_name — ถ้ามีค่า จะยกเลิก date filter" }
        - { name: from_date,  in: query,                  schema: { type: string, format: date }, example: "2024-01-01" }
        - { name: to_date,    in: query,                  schema: { type: string, format: date }, example: "2024-01-31" }
      responses:
        '200':
          description: รายการประวัติการขาย
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        doc_no:              { type: string }
                        doc_date:            { type: string, format: date }
                        doc_time:            { type: string }
                        cust_code:           { type: string }
                        cust_name:           { type: string }
                        total_amount:        { type: string }
                        cash_amount:         { type: string }
                        tranfer_amount:      { type: string }
                        card_amount:         { type: string }
                        wallet_amount:       { type: string }
                        total_credit_charge: { type: string }
                        total_net_amount:    { type: string }
                        total_amount_pay:    { type: string }
        '500':
          description: DB error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessOnly' }

  /getDocSaleHistoryDetail:
    get:
      tags: [POS]
      summary: รายการสินค้าใน Invoice
      parameters:
        - { name: doc_no, in: query, required: true, schema: { type: string }, example: "MPOS-2026-0001" }
      responses:
        '200':
          description: รายการสินค้าจาก ic_trans_detail (trans_flag=44)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        item_code:    { type: string }
                        item_name:    { type: string }
                        unit_code:    { type: string }
                        qty:          { type: number }
                        price:        { type: number }
                        wh_code:      { type: string }
                        shelf_code:   { type: string }
                        stand_value:  { type: number }
                        divide_value: { type: number }
                        ratio:        { type: number }
        '400':
          description: doc_no ไม่ส่งมา
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessOnly' }
        '500':
          description: DB error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessOnly' }
