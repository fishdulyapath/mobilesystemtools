services:
  mstservice:
    image: minorsoft/mstservice:latest
    container_name: mstservice
    restart: always
    expose:
      - "47300"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_IMAGES_NAME: ${DB_IMAGES_NAME}
      PORT: 47300
    networks:
      - mst_net
      - sml_service_network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:47300/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mstapp:
    image: minorsoft/mstapp:latest
    container_name: mstapp
    restart: always
    depends_on:
      mstservice:
        condition: service_healthy
    networks:
      - mst_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: always
    ports:
      - "8094:80"
    volumes:
      - ./nginx-mst.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - mstapp
      - mstservice
    networks:
      - mst_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  mst_net:
    driver: bridge
  sml_service_network:
    external: true

