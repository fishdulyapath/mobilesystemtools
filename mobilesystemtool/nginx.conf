server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    client_max_body_size 25m;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    location = /mobiletools {
        return 301 /mobiletools/;
    }

    location /mobiletools/ {
        try_files $uri $uri/ /mobiletools/index.html;
    }

    location ~* ^/mobiletools/.+\.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
