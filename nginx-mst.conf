server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    # Forward /service/* -> backend (strip /service prefix)
    location /service/ {
        proxy_pass http://mobiletoolsservice:47300/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Forward /mobiletoolsservice/* -> backend (strip prefix)
    location /mobiletoolsservice/ {
        proxy_pass http://mobiletoolsservice:47300/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Forward /mobiletools/* -> frontend
    location /mobiletools/ {
        proxy_pass http://mobiletools/mobiletools/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional backward compatibility from old service route
    location /mstservice/ {
        proxy_pass http://mobiletoolsservice:47300/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location = /mobiletool {
        return 301 /mobiletools/;
    }

    location /mobiletool/ {
        return 301 /mobiletools/;
    }

    # Optional backward compatibility from old route
    location = /smlstaff {
        return 301 /mobiletools/;
    }

    location /smlstaff/ {
        return 301 /mobiletools/;
    }

    location = / {
        return 301 /mobiletools/;
    }
}
