server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    # Forward /service/* -> backend (strip /service prefix)
    location /service/ {
        proxy_pass http://mstservice:47300/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Forward /mstservice/* -> backend (strip prefix)
    location /mstservice/ {
        proxy_pass http://mstservice:47300/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Forward /mobiletool/* -> frontend
    location /mobiletool/ {
        proxy_pass http://mstapp/mobiletool/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional backward compatibility from old route
    location = /smlstaff {
        return 301 /mobiletool/;
    }

    location /smlstaff/ {
        return 301 /mobiletool/;
    }

    location = / {
        return 301 /mobiletool/;
    }
}
